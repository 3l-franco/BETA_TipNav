name: tip_nav
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.7.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1

  # existing packages
  cupertino_icons: ^1.0.8
  mapbox_maps_flutter: ^2.19.1
  permission_handler: ^11.4.0
  geolocator: ^14.0.2
  flutter_dotenv: ^6.0.0

  # removed: http, crypto, shared_preferences (not needed anymore, firebase handles it)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - images/
    - .env
